<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mileage Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvm4YlljVKsud78JTJgN46wmCLPealh7A&libraries=places"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f1117;--card:#1a1d27;--border:#2a2e3f;
  --accent:#3b82f6;--accent-h:#2563eb;--accent-s:rgba(59,130,246,0.1);
  --ok:#10b981;--ok-s:rgba(16,185,129,0.1);
  --warn:#f59e0b;--warn-s:rgba(245,158,11,0.1);
  --err:#ef4444;--err-s:rgba(239,68,68,0.1);
  --text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --white:#fff;--font:'DM Sans','Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.hdr{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);padding:24px 20px 20px;text-align:center}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--white)}
.hdr .sub{font-size:13px;color:var(--dim);margin-top:4px}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);white-space:nowrap}
.tab.on{font-weight:600;color:var(--accent);border-bottom-color:var(--accent)}
.cnt{padding:20px;max-width:600px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
.fl{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fg{margin-bottom:18px}
input[type=date],input[type=text],input[type=email],select{width:100%;padding:12px 14px;font-size:15px;font-family:var(--font);background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:0;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;font-size:15px;font-weight:600;font-family:var(--font);border:none;border-radius:10px;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent-h));color:var(--white)}
.bs{background:var(--accent-s);color:var(--accent)}
.bo{background:var(--ok-s);color:var(--ok)}
.bg{background:none;color:var(--muted);border:1px solid var(--border)}
.bsm{width:auto;padding:8px 14px;font-size:13px}
.tst{padding:14px 18px;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:16px;display:none;align-items:center;gap:10px}
.tst.show{display:flex}
.tst.success{background:var(--ok-s);color:var(--ok)}
.tst.error{background:var(--err-s);color:var(--err)}
.tst.warn{background:var(--warn-s);color:var(--warn)}
.tst.info{background:var(--accent-s);color:var(--accent)}
.rc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bb{background:var(--accent-s);color:var(--accent)}
.bgreen{background:var(--ok-s);color:var(--ok)}
.bw{background:var(--warn-s);color:var(--warn)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot.y{background:var(--ok)}.dot.n{background:var(--warn)}
.li{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.lbtn{background:none;border:none;font-size:12px;cursor:pointer;font-family:var(--font);text-decoration:underline;padding:0}
.fr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.es{text-align:center;padding:48px 20px;color:var(--dim)}
.summ{background:var(--accent-s);border-radius:12px;padding:14px;text-align:center;margin-top:16px;font-size:13px;color:var(--accent);font-weight:500}
.lt{text-align:center;margin-top:16px;color:var(--dim);font-size:13px}
.er{display:flex;gap:8px;margin-bottom:20px}
.er input{flex:1;font-size:13px}
.er .btn{width:auto;padding:8px 16px;font-size:13px;white-space:nowrap}
input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;margin-top:2px;flex-shrink:0}
.ri{display:flex;align-items:flex-start;gap:12px}
.rb{flex:1}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rd{font-weight:600;font-size:15px}
.rl{font-size:13px;color:var(--muted);margin-bottom:4px}
.rl span{color:var(--accent)}
.ra{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.dbtn{background:none;border:none;color:var(--err);font-size:12px;cursor:pointer;font-family:var(--font);margin-left:auto}
.uz{border:2px dashed var(--border);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px}
.uz:hover{border-color:var(--accent)}
.uz input{display:none}
.pr{display:flex;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px;align-items:center}
.pr .pd{color:var(--accent);font-weight:600;min-width:70px}
.pr .pt{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr .ps{font-size:11px;font-weight:600;flex-shrink:0}
.pbar{width:100%;height:6px;background:var(--border);border-radius:3px;margin:12px 0;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
</style>
</head>
<body>

<div class="hdr"><h1>Mileage Tracker</h1><div class="sub" id="stats">0 trips</div></div>
<div class="tabs">
  <button class="tab on" id="t0" onclick="showTab(0)">+ Log</button>
  <button class="tab" id="t1" onclick="showTab(1)">Upload</button>
  <button class="tab" id="t2" onclick="showTab(2)">Records</button>
  <button class="tab" id="t3" onclick="showTab(3)">Locations</button>
</div>
<div class="cnt">
  <div class="tst" id="tst"><span id="ti"></span><span id="tm"></span></div>

  <!-- LOG TRIP -->

  <div class="pg on" id="p0">
    <div class="fg"><label class="fl">Date</label><input type="date" id="tripDate"></div>
    <div class="fg"><label class="fl">Start Location</label><select id="startLoc"><option value="">Select...</option></select></div>
    <div class="fg"><label class="fl">End Location</label><select id="endLoc"><option value="">Select...</option></select></div>
    <button class="btn bp" id="subBtn" onclick="doSubmit()">Submit Trip</button>
    <div class="lt" id="subLt" style="display:none"></div>
  </div>

  <!-- UPLOAD -->

  <div class="pg" id="p1">
    <div class="uz" onclick="document.getElementById('fIn').click()">
      <div style="font-size:32px;margin-bottom:8px">📂</div>
      <div style="font-size:15px;font-weight:600;color:var(--white)">Tap to upload file</div>
      <div style="font-size:13px;color:var(--dim);margin-top:4px">CSV or Excel (.xlsx)</div>
      <input type="file" id="fIn" accept=".csv,.xlsx,.xls" onchange="onFile(event)">
    </div>
    <div id="uprev"></div>
  </div>

  <!-- RECORDS -->

  <div class="pg" id="p2"><div id="recsEl"></div></div>

  <!-- LOCATIONS -->

  <div class="pg" id="p3">
    <div class="fg"><label class="fl">Address</label><input type="text" id="nAddr" placeholder="Full address..."></div>
    <div class="fg"><label class="fl">Label (optional)</label><input type="text" id="nLbl" placeholder="Short name..."></div>
    <button class="btn bs" onclick="addLoc()" style="margin-bottom:20px">Add Location</button>
    <label class="fl" id="locCt"></label>
    <div id="locList"></div>
  </div>
</div>

<script>
var WH = "https://script.google.com/macros/s/AKfycbwL3oUXdDAOLdKYNWCCv-juP1WNRpvWg8xAfcTN9Mv0SsipakaYqQ0cpRnBZe6VZHqZrQ/exec";

// ─── LOCATIONS ────────────────────────────────────────────────────────
// Baked-in defaults — appear on every device. Edit here + commit to GitHub to update.
var DEFLOCS = [
  {address:"14130 South State Rd 7, Sunrise, FL 33313",           label:"14130 South State Rd 7"},
  {address:"700 N Hiatus Road, Pembroke Pines, FL 33026",          label:"700 N Hiatus Road"},
  {address:"4100 Salzedo St, Coral Gables, FL 33146",              label:"4100 Salzedo St"},
  {address:"1051 E 49th St, Hialeah, FL 33013",                    label:"1051 E 49th St"},
  {address:"4811 Lyons Technology Pkwy, Coconut Creek, FL 33073",  label:"4811 Lyons Technology Pkwy"},
  {address:"1650 NW 70th Ave, Miami, FL 33126",                    label:"1650 NW 70th Ave"},
  {address:"3350 Enterprise Ave, Weston, FL 33331",                label:"3350 Enterprise Ave"},
  {address:"11200 NW 25th St, Doral, FL 33172",                    label:"11200 NW 25th St"},
  {address:"1900 NW 129th Ave, Miami, FL 33182",                   label:"1900 NW 129th Ave"},
  {address:"1800 NW 129th Ave, Miami, FL 33182",                   label:"1800 NW 129th Ave"},
  {address:"8600 NW 17th St, Doral, FL 33126",                     label:"8600 NW 17th St"},
  {address:"1650 NW 117th Place, Miami, FL 33182",                 label:"Home Depot Sweetwater"},
  {address:"569 W 17th St, Hialeah, FL 33010",                     label:"Edsun Lighting"},
  {address:"2121 Ponce De Leon Blvd, Coral Gables, FL 33134",      label:"2121 Ponce De Leon"},
  {address:"3850 NW 108th St, Miami, FL 33147",                    label:"3850 W 108th St"},
  {address:"14802 NW 107th Ave, Hialeah, FL 33018",                label:"14802 NW 107th Ave"},
  {address:"8600 NW 129th Ave, Miami, FL 33182",                   label:"8600 NW 129th Ave"},
  {address:"4450 N State Road 7, Coconut Creek, FL 33073",         label:"Home Depot Coconut Creek"},
  {address:"4611 Johnson Rd Suite 6, Coconut Creek, FL 33073",     label:"4611 Johnson Rd Suite 6"},
  {address:"110 SE 6th St, Fort Lauderdale, FL 33301",             label:"110 SE 6th St"},
  {address:"2195 W 4th Ave, Hialeah, FL 33010",                    label:"Sherwin Williams Hialeah"}
];

var locs = [], recs = [], selSet = new Set(), parsed = [];

// ─── UTILS ───────────────────────────────────────────────────────────
function today() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function fmtD(d) {
  try { return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
  catch(e) { return d; }
}
// PK uses a timestamp for uniqueness on manual entries
function makePK(ts, s, e) { return ts + "|" + s + "|" + e; }

// ─── STORAGE ─────────────────────────────────────────────────────────
function loadAll() {
  try { locs = JSON.parse(localStorage.getItem("ml7")) || []; } catch(e) { locs = []; }
  // Merge defaults so they always appear even if user has custom localStorage
  DEFLOCS.forEach(function(def) {
    var exists = locs.some(function(l) { return l.address.toLowerCase() === def.address.toLowerCase(); });
    if (!exists) locs.push(def);
  });
  saveLocs();
  try { recs = JSON.parse(localStorage.getItem("mr7")) || []; } catch(e) { recs = []; }
}
function saveLocs() { localStorage.setItem("ml7", JSON.stringify(locs)); }
function saveRecs() { localStorage.setItem("mr7", JSON.stringify(recs)); }

// ─── TOAST ───────────────────────────────────────────────────────────
var toastTmr;
function toast(msg, type) {
  var el = document.getElementById("tst");
  var icons = {success:"✓",error:"✕",warn:"⚠",info:"ℹ"};
  document.getElementById("ti").textContent = icons[type] || "ℹ";
  document.getElementById("tm").textContent = msg;
  el.className = "tst show " + (type || "info");
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function() { el.className = "tst"; }, 8000);
}

function showTab(n) {
  for (var i = 0; i < 4; i++) {
    document.getElementById("t"+i).className = (i===n) ? "tab on" : "tab";
    document.getElementById("p"+i).className = (i===n) ? "pg on" : "pg";
  }
  if (n===2) renderRecs();
  if (n===3) renderLocs();
}

function popDD() {
  ["startLoc","endLoc"].forEach(function(id) {
    var sel = document.getElementById(id);
    var val = sel.value;
    sel.innerHTML = '<option value="">Select...</option>';
    locs.forEach(function(l) {
      var o = document.createElement("option");
      o.value = l.address; o.textContent = l.label;
      sel.appendChild(o);
    });
    sel.value = val;
  });
}

// ─── DISTANCE ────────────────────────────────────────────────────────
function getDist(origin, dest) {
  return new Promise(function(resolve) {
    try {
      if (typeof google === "undefined" || !google.maps) { resolve(null); return; }
      var svc = new google.maps.DistanceMatrixService();
      svc.getDistanceMatrix({
        origins: [origin],
        destinations: [dest],
        travelMode: google.maps.TravelMode.DRIVING,
        unitSystem: google.maps.UnitSystem.IMPERIAL
      }, function(res, st) {
        if (st==="OK" && res.rows[0] && res.rows[0].elements[0] && res.rows[0].elements[0].status==="OK") {
          var mi = Math.round(res.rows[0].elements[0].distance.value / 1609.344 * 10) / 10;
          resolve({miles:mi, source:"google-maps"});
        } else { resolve(null); }
      });
    } catch(e) { resolve(null); }
  });
}

// ─── ZAPIER SYNC ─────────────────────────────────────────────────────
function syncWH(rec) {
  // no-cors mode: must use FormData with no custom headers
  var fd = new FormData();
  fd.append("primary_key",    rec.pk);
  fd.append("date",           rec.date);
  fd.append("start_location", rec.start);
  fd.append("end_location",   rec.end);
  fd.append("distance_miles", String(rec.distance));
  fd.append("source",         rec.source);
  fd.append("created_at",     rec.createdAt);
  return fetch(WH, {
    method: "POST",
    mode: "no-cors",
    body: fd
  }).then(function() { return true; })
    .catch(function() { return false; });
}

// ─── SUBMIT TRIP ─────────────────────────────────────────────────────
function doSubmit() {
  var date  = document.getElementById("tripDate").value;
  var start = document.getElementById("startLoc").value;
  var end   = document.getElementById("endLoc").value;
  if (!date || !start || !end) { toast("Fill all fields","error"); return; }
  if (start === end) { toast("Start and end must differ","error"); return; }

  var isDupe = recs.some(function(r) { return r.date === date && r.start === start && r.end === end; });
  if (isDupe) { toast("Duplicate — trip already exists for this date","warn"); return; }
  var pk = makePK(new Date().toISOString(), start, end);

  var btn = document.getElementById("subBtn");
  var lt  = document.getElementById("subLt");
  btn.disabled = true; btn.textContent = "Calculating...";
  lt.style.display = "block"; lt.textContent = "Getting distance...";

  getDist(start, end).then(function(d) {
    var dist = 0, src = "manual";
    if (d) { dist = d.miles; src = d.source; }
    var now = new Date().toISOString();
    var rec = {pk:pk, date:date, start:start, end:end, distance:dist, source:src, createdAt:now, synced:false};
    lt.textContent = "Syncing...";
    return syncWH(rec).then(function(ok) {
      rec.synced = ok;
      recs.unshift(rec); saveRecs(); updStats();
      toast(ok ? "Logged "+dist+" mi — Synced!" : "Saved locally (sync pending)", ok?"success":"warn");
      document.getElementById("startLoc").value = "";
      document.getElementById("endLoc").value = "";
      document.getElementById("tripDate").value = today();
      btn.disabled = false; btn.textContent = "Submit Trip"; lt.style.display = "none";
    });
  });
}

// ─── FILE UPLOAD ─────────────────────────────────────────────────────
function pDate(raw) {
  if (!raw) return null;
  var s = String(raw).trim();
  if (!s) return null;
  // MM/DD/YY or MM/DD/YYYY
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    var y = parseInt(m[3]); if (y < 100) y += 2000;
    return y + "-" + String(m[1]).padStart(2,"0") + "-" + String(m[2]).padStart(2,"0");
  }
  // YYYY-MM-DD
  var m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return m2[0];
  // Excel serial date number
  var num = parseFloat(s);
  if (!isNaN(num) && num > 1 && num < 200000) {
    var epoch = new Date((num - 25569) * 86400000);
    return epoch.getFullYear() + "-" + String(epoch.getMonth()+1).padStart(2,"0") + "-" + String(epoch.getDate()).padStart(2,"0");
  }
  return null;
}

function onFile(ev) {
  var f = ev.target.files[0]; if (!f) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:"array"});
      // raw:false keeps dates as readable strings instead of Excel serial numbers
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:"", raw:false});
      parseRows(rows);
    } catch(err) { toast("Parse error: " + err.message, "error"); }
  };
  reader.readAsArrayBuffer(f);
}

// ─── CSV PARSER ──────────────────────────────────────────────────────
// Handles the mileage log format:
//   Row 0:  Date, Trip #, Start Location, End Location   ← header (skipped)
//   Row N:  03/02/26, , ,                                ← date-only row → sets current date
//   Row N+: , 1.0, 4100 Salzedo ST, 14130 ...            ← trip row (col2=start, col3=end)
//   Summary/Total rows at bottom are ignored automatically
function parseRows(rows) {
  parsed = [];
  if (!rows || !rows.length) { renderPreview(); return; }

  var curDate = null;
  var startRow = 0;

  // Skip header row if first cell contains "date"
  if (String(rows[0] && rows[0][0] || "").toLowerCase().indexOf("date") >= 0) {
    startRow = 1;
  }

  for (var i = startRow; i < rows.length; i++) {
    var r = rows[i];
    if (!r) continue;

    // Skip fully empty rows
    var allEmpty = true;
    for (var j = 0; j < r.length; j++) {
      if (String(r[j] || "").trim() !== "") { allEmpty = false; break; }
    }
    if (allEmpty) continue;

    var col0 = String(r[0] || "").trim();
    var col2 = String(r[2] || "").trim();
    var col3 = String(r[3] || "").trim();

    // Skip summary/total rows
    if (col0.toLowerCase().indexOf("summary") >= 0 ||
        col0.toLowerCase().indexOf("total") >= 0) continue;

    // Date-only row: col0 has a parseable date, col2 and col3 are empty
    var parsedDate = pDate(col0);
    if (parsedDate && !col2 && !col3) {
      curDate = parsedDate;
      continue;
    }

    // Trip row: col2=start, col3=end
    // Edge case: if col0 has a date AND col2+col3 present, update curDate too
    if (parsedDate && col2 && col3) {
      curDate = parsedDate;
    }

    if (curDate && col2 && col3) {
      parsed.push({date: curDate, start: col2, end: col3});
    }
  }

  renderPreview();
}

function renderPreview() {
  var el = document.getElementById("uprev");
  if (!parsed.length) {
    el.innerHTML = '<div class="es">No trips found in file.<br><span style="font-size:12px;margin-top:6px;display:block">Expected: Date column, then rows with Start &amp; End locations in columns 3 &amp; 4.</span></div>';
    return;
  }
  var h = '<div style="margin-bottom:16px">' +
    '<div style="font-size:15px;font-weight:600;color:var(--white)">Found ' + parsed.length + ' trips</div>' +
    '<div style="font-size:13px;color:var(--dim)">All ' + parsed.length + ' will be imported (no duplicate check on uploads)</div></div>';

  h += '<button class="btn bp" onclick="processUpload()" id="procBtn" style="margin-bottom:16px">Import All ' + parsed.length + ' Trips</button>' +
       '<div class="pbar" id="upProg" style="display:none"><div class="pfill" id="upFill" style="width:0%"></div></div>' +
       '<div class="lt" id="upStat" style="display:none"></div>';

  h += '<div style="max-height:350px;overflow-y:auto;margin-top:12px">';
  parsed.forEach(function(p) {
    h += '<div class="pr">' +
         '<span class="pd">' + fmtD(p.date) + '</span>' +
         '<span class="pt">' + p.start + ' → ' + p.end + '</span>' +
         '<span class="ps" style="color:var(--ok)">NEW</span></div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function processUpload() {
  var btn  = document.getElementById("procBtn");
  var prog = document.getElementById("upProg");
  var fill = document.getElementById("upFill");
  var stat = document.getElementById("upStat");
  btn.disabled = true; btn.textContent = "Processing...";
  prog.style.display = "block"; stat.style.display = "block";

  // Upload always imports all rows — no duplicate check applied
  var toProc = parsed.slice();

  var idx = 0, synced = 0, totalMi = 0;

  function next() {
    if (idx >= toProc.length) {
      saveRecs(); updStats();
      stat.textContent = "Done! " + toProc.length + " trips · " + totalMi.toFixed(1) + " mi · " + synced + " synced";
      btn.textContent = "Done!";
      toast("Imported " + toProc.length + " trips (" + totalMi.toFixed(1) + " mi)", "success");
      document.getElementById("fIn").value = "";
      return;
    }
    var trip = toProc[idx]; idx++;
    fill.style.width = Math.round(idx / toProc.length * 100) + "%";
    stat.textContent = idx + "/" + toProc.length + ": " + trip.start + " → " + trip.end;

    getDist(trip.start, trip.end).then(function(d) {
      var dist = 0, src = "manual";
      if (d) { dist = d.miles; src = d.source; totalMi += dist; }
      var now = new Date().toISOString();
      var pk  = makePK(now, trip.start, trip.end);
      var rec = {pk:pk, date:trip.date, start:trip.start, end:trip.end, distance:dist, source:src, createdAt:now, synced:false};
      syncWH(rec).then(function(ok) {
        rec.synced = ok; if (ok) synced++;
        recs.unshift(rec);
        setTimeout(next, 400);
      });
    });
  }
  next();
}

// ─── RECORDS ─────────────────────────────────────────────────────────
function retrySync(i) {
  toast("Syncing...","info");
  syncWH(recs[i]).then(function(ok) {
    if (ok) { recs[i].synced = true; saveRecs(); renderRecs(); updStats(); toast("Synced!","success"); }
    else toast("Sync failed","error");
  });
}

function syncAll() {
  var unsync = []; recs.forEach(function(r,i) { if (!r.synced) unsync.push(i); });
  if (!unsync.length) { toast("All synced!","success"); return; }
  toast("Syncing " + unsync.length + "...","info");
  var ci = 0, count = 0;
  function doNext() {
    if (ci >= unsync.length) {
      saveRecs(); renderRecs(); updStats();
      toast(count + "/" + unsync.length + " synced", count === unsync.length ? "success" : "warn");
      return;
    }
    var ri = unsync[ci]; ci++;
    syncWH(recs[ri]).then(function(ok) { if (ok) { recs[ri].synced = true; count++; } doNext(); });
  }
  doNext();
}

function editDist(i) {
  var v = prompt("Miles:", recs[i].distance);
  if (v !== null && !isNaN(parseFloat(v))) {
    recs[i].distance = parseFloat(v); recs[i].source = "manual";
    saveRecs(); renderRecs(); updStats(); toast("Updated","success");
  }
}

function delRec(i) {
  if (!confirm("Delete this trip?")) return;
  recs.splice(i, 1); selSet.clear(); saveRecs(); renderRecs(); updStats();
}

function expCSV() {
  var rows = recs.filter(function(_, i) { return selSet.size === 0 || selSet.has(i); });
  if (!rows.length) { toast("No records to export","warn"); return; }
  var lines = ["Primary Key,Date,Start Location,End Location,Distance (mi),Source,Created At"];
  rows.forEach(function(r) {
    lines.push('"' + r.pk + '","' + r.date + '","' + r.start + '","' + r.end + '",' + r.distance + ',"' + r.source + '","' + r.createdAt + '"');
  });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\n")], {type:"text/csv"}));
  a.download = "mileage-" + today() + ".csv"; a.click();
  toast("Exported " + rows.length + " records","success");
}

function togSel(i) { selSet.has(i) ? selSet.delete(i) : selSet.add(i); renderRecs(); }
function togAll() { selSet.size === recs.length ? selSet.clear() : recs.forEach(function(_,i) { selSet.add(i); }); renderRecs(); }

function renderRecs() {
  var el = document.getElementById("recsEl");
  if (!recs.length) {
    el.innerHTML = '<div class="es"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:16px;font-weight:500">No trips yet</div></div>';
    return;
  }
  var uc = 0, tm = 0, sc = 0;
  recs.forEach(function(r) { if (!r.synced) uc++; else sc++; tm += (r.distance||0); });

  var h = '<div class="fr" style="margin-bottom:12px">' +
    '<button class="btn bg bsm" onclick="togAll()">' + (selSet.size === recs.length ? 'Deselect' : 'Select All') + '</button>' +
    '<button class="btn bs bsm" onclick="expCSV()">Export CSV' + (selSet.size > 0 ? ' (' + selSet.size + ')' : '') + '</button></div>';
  if (uc > 0) h += '<button class="btn bo" onclick="syncAll()" style="margin-bottom:16px">Sync ' + uc + ' unsynced to Sheets</button>';
  h += '<div class="er"><input type="email" id="emailTo" placeholder="Email CSV to..."><button class="btn bs" onclick="emailRecs()">Send</button></div>';

  recs.forEach(function(r, i) {
    h += '<div class="rc"><div class="ri">' +
      '<input type="checkbox" ' + (selSet.has(i)?'checked':'') + ' onchange="togSel(' + i + ')">' +
      '<div class="rb"><div class="rh"><span class="rd">' + fmtD(r.date) + '</span>' +
      '<div style="display:flex;align-items:center;gap:6px"><span class="dot ' + (r.synced?'y':'n') + '"></span>' +
      '<span style="font-size:11px;color:' + (r.synced?'var(--ok)':'var(--warn)') + '">' + (r.synced?'Synced':'Local') + '</span></div></div>' +
      '<div class="rl"><span>From:</span> ' + r.start + '</div>' +
      '<div class="rl"><span>To:</span> ' + r.end + '</div>' +
      '<div class="ra"><span class="badge ' + (r.distance>0?'bb':'bw') + '">' + (r.distance>0?r.distance+' mi':'No dist') + '</span>' +
      '<span class="badge bgreen">' + r.source + '</span>' +
      '<button class="lbtn" style="color:var(--dim)" onclick="editDist(' + i + ')">edit</button>' +
      (!r.synced ? '<button class="lbtn" style="color:var(--accent)" onclick="retrySync(' + i + ')">retry sync</button>' : '') +
      '<button class="dbtn" onclick="delRec(' + i + ')">delete</button>' +
      '</div></div></div></div>';
  });
  h += '<div class="summ">Total: ' + recs.length + ' trips · ' + tm.toFixed(1) + ' mi · ' + sc + ' synced</div>';
  el.innerHTML = h;
}

function emailRecs() {
  var to = document.getElementById("emailTo") ? document.getElementById("emailTo").value : "";
  if (!to || to.indexOf("@") < 0) { toast("Enter a valid email","error"); return; }
  var rows = recs.filter(function(_, i) { return selSet.size === 0 || selSet.has(i); });
  if (!rows.length) { toast("No records selected","warn"); return; }
  var tm = 0; rows.forEach(function(r) { tm += (r.distance||0); });
  var lines = ["Date,Start,End,Miles"];
  rows.forEach(function(r) { lines.push(r.date + "," + r.start + "," + r.end + "," + r.distance); });
  var body = "Mileage Report\n" + rows.length + " trips, " + tm.toFixed(1) + " mi\n\n" + lines.join("\n");
  window.open("mailto:" + to + "?subject=" + encodeURIComponent("Mileage Report " + today()) + "&body=" + encodeURIComponent(body));
}

// ─── LOCATIONS TAB ───────────────────────────────────────────────────
function addLoc() {
  var a = document.getElementById("nAddr").value.trim();
  var l = document.getElementById("nLbl").value.trim() || a;
  if (!a) { toast("Enter address","error"); return; }
  var exists = locs.some(function(x) { return x.address.toLowerCase() === a.toLowerCase(); });
  if (exists) { toast("Location already exists","warn"); return; }
  locs.push({address:a, label:l}); saveLocs(); popDD(); renderLocs();
  document.getElementById("nAddr").value = ""; document.getElementById("nLbl").value = "";
  toast("Location added","success");
}

function remLoc(i) {
  if (!confirm("Remove this location?")) return;
  locs.splice(i, 1); saveLocs(); popDD(); renderLocs();
}

function renderLocs() {
  document.getElementById("locCt").textContent = locs.length + " Saved Locations";
  var h = "";
  locs.forEach(function(l, i) {
    h += '<div class="li"><div><div style="font-size:14px;font-weight:500">' + l.label + '</div>' +
      (l.label !== l.address ? '<div style="font-size:12px;color:var(--dim);margin-top:2px">' + l.address + '</div>' : '') +
      '</div><button onclick="remLoc(' + i + ')" style="background:none;border:none;color:var(--err);font-size:18px;cursor:pointer">×</button></div>';
  });
  document.getElementById("locList").innerHTML = h;
}

// ─── STATS ───────────────────────────────────────────────────────────
function updStats() {
  var t = recs.length, m = 0, s = 0;
  recs.forEach(function(r) { m += (r.distance||0); if (r.synced) s++; });
  document.getElementById("stats").textContent = t + " trips · " + m.toFixed(1) + " mi · " + s + "/" + t + " synced";
  document.getElementById("t2").textContent = "Records (" + t + ")";
}

// ─── INIT ────────────────────────────────────────────────────────────
loadAll();
document.getElementById("tripDate").value = today();
popDD();
updStats();
</script>

</body>
</html>
